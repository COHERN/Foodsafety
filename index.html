  <script id="builtin-docs" type="application/json">[{"name": "TAP Food Safety Manager Review Sheet.pdf", "text": "TAP FOOD SAFETY MANAGER REVIEW SHEET (ANSI Exam study sheet)\n\nLESSON 1 - INTRODUCTION\nHighly Susceptible Populations (HSPs): very young, elderly, chronically ill, those with immune problems.\nFive Most Common Risk Factors: purchasing food from unsafe sources; failing to cook food adequately; holding food at improper temperatures; using contaminated equipment; practicing poor personal hygiene.\nAgencies: USDA regulates meat, poultry, eggs, interstate food. FDA regulates all other food, publishes the Food Code. CDC and PHS research illness causes. State/local health jurisdictions.\nManager role: ensure customer safety, food safe from delivery to service, rules followed, staff trained, prepared for inspections.\nActive Managerial Controls: create SOPs, ensure followed, train staff, evaluate and revise.\n\nLESSON 2 - FOODBORNE ILLNESS OVERVIEW\nTCS foods (Time/Temperature Control for Safety): milk, chicken, cooked rice, melons, sprouts, vacuum-packaged foods, eggs, meats, fish, cooked potatoes. Ready-to-eat: vegetables, fruits, deli, bakery items.\nThree Food Contaminants: Biological (pathogens - bacteria, viruses, parasites, fungi); Chemical (cleaners, sanitizers, poisons); Physical (glass, bandages, dirt, fake fingernails, jewelry).\nFATTOM = Food, Acidity, Temperature, Time, Oxygen, Moisture.\nConsumer Advisory: required for raw/undercooked animal foods, on menus/placards/table tents.\n\nLESSON 3 - FOODBORNE ILLNESSES AND ALLERGIES\nShigella spp.: found in human feces, transferred by flies; prevention: exclude workers with diarrhea, proper handwashing, control flies.\nSalmonella Typhi: blood/feces of typhoid-infected; ready-to-eat foods, beverages; cook to min temps.\nNon-Typhoidal Salmonella: poultry, eggs, meat, dairy, produce; cook poultry/eggs to min temps, prevent cross-contamination.\nShiga toxin-producing E. coli (STEC): cattle intestines, ground beef; cook ground beef to min temp.\nHepatitis A: virus in humans, ready-to-eat foods, shellfish; handwashing, avoid bare hand contact, normal cooking does NOT destroy it.\nNorovirus: very contagious, ready-to-eat foods, shellfish; handwashing, avoid bare hand contact.\nBiological Toxins: fish, shellfish; cannot be destroyed by cooking/freezing; buy from reputable suppliers.\nBig 9 Allergens: Milk, Eggs, Fin Fish, Shellfish, Peanuts, Tree nuts, Wheat, Sesame, Soy.\nFood Defense: A.L.E.R.T. (Assure, Look, Employees, Reports, Threat).\n\nLESSON 4 - PERSONAL HYGIENE\nWash hands after: restroom, touching body/clothing, coughing/sneezing, eating/drinking/smoking, handling soiled items, taking out garbage, touching contaminated items, handling raw meat/seafood/poultry, changing tasks, handling money, using electronics, handling chemicals.\nProper handwashing: warm water at least 85F/29C, wet hands/arms to elbow, apply soap, rub 10-15 seconds, rinse, dry with paper towel, use paper towel to turn off faucet.\nAvoid bare hand contact with ready-to-eat foods.\nChange gloves: if dirty/torn, new task, after handling raw meat, before ready-to-eat, after 4 hours continuous use.\nHand sinks need signage to wash hands and a garbage container for paper towels.\n\nFOOD WORKER ILLNESSES (actions for manager):\nVomiting/Diarrhea: exclude; return after 24 hours symptom-free or doctor release.\nJaundice: exclude, report to regulatory agency, need written doctor release + regulatory approval.\nSore Throat with Fever: restrict; exclude if working with HSP; need doctor release.\nCDC Big Six: exclude, report to regulatory agency.\nPersistent Sneeze/Cough/Runny Nose: restrict activity.\nInfected Wound or Boil: cover wound; if uncovered, restrict activity.\n\nLESSON 5 - KEEPING FOOD SAFE\nTCS Danger Zone: 41F-135F (5C-47C). Bacteria grow most rapidly 70F-125F. Above 135F/57C and below 41F/5C bacteria grow more slowly or die.\nThermometers for storage equipment accurate to +/- 3F/1.5C.\nCross-contamination: separate raw meat/poultry/seafood from ready-to-eat during storage, prep, holding, display.\nFood recall steps: check stock, remove recalled item to secure location, mark it, follow vendor recommendation.\n\nLESSON 6 - PURCHASING AND RECEIVING\nOnly purchase from trusted sources. Reject deliveries with ice crystals, stained packaging, damage, bloating, bad odor, slime, mold.\nReceiving temps: most chilled/cold TCS at or below 41F/5C; hot foods at or above 135F/57C; ROP packaged at 41F/5C; live shellfish/shell eggs air 45F internal 50F; shucked shellfish 45F or lower; fresh fish at or below 41F; frozen food hard frozen.\nShell stock tags kept chronological order for 90 days.\n\nLESSON 7 - STORING FOOD\nStore food minimum 6 inches above floor and away from walls.\nRefrigerator at or below 41F/5C.\nRefrigerator storage order top to bottom: ready-to-eat foods/produce; seafood; whole cuts beef/pork; ground/injected/marinated meats, ground fish, raw eggs; whole/ground poultry.\nDry storage 50F/10C, well ventilated, low humidity.\nReady-to-eat TCS foods stored no more than 7 days if held at 41F. Mark if held longer than 24 hours; Day 1 is prep/open day.\nFIFO - First In First Out. Store chemicals away from food.\n\nLESSON 8 - THAWING, PREP, COOKING, COOLING, REHEATING\nHot foods at 135F or above at all times.\nFour thawing methods: at 41F or lower; as part of cooking; under cold running water at 70F or lower; microwave if cooked immediately.\nCooking min internal temps:\n165F (74C) <1 sec: whole/ground poultry, stuffed meats/fish/pasta, microwave foods.\n155F (68C) 17 sec: ground meat, injected meat, ground fish, eggs hot-held.\n145F (63C) 15 sec: meat steaks/chops, fish, eggs immediate service.\n145F 4 min down to 130F 112 min: meat roasts.\n135F (57C) no min time: processed ready-to-eat, plant foods, fruits, grains, beans.\nCooling two-step: 135F to 70F within 2 hours; 70F to 41F within next 4 hours; total not more than 6 hours.\nCooling methods: ice-water bath, blast chiller, ice paddle, shallow pans.\nCold TCS held without temperature control: 6 hours if internal does not exceed 70F; 4 hours at 41-135F.\nReheat to 165F/74C.\n\nLESSON 9 - SERVING FOOD SAFELY\nDo not touch food-contact surfaces of dishware. Hold plates by bottom/edges, glasses by bottom/stem, cups by handles.\nAvoid bare hand contact with ready-to-eat foods.\nSelf-serve bars: hot food up to 4 hours if held at 135F; cold food up to 6 hours if held at 41F.\n\nLESSON 10 - EQUIPMENT AND UTENSILS\nHigh-temp dishwashers: final rinse minimum 180F/82C.\nStore glassware 6 inches off floor, pots/pans upside down, flatware handles up.\n\nLESSON 11 - FACILITIES AND EQUIPMENT\nFloors smooth, slip resistant, non-absorbent, sealed, coving in corners.\nLight bulbs shielded/shatter resistant.\nPrevent cross connection of potable and waste water; use air gaps and vacuum breakers.\nLighting: 50 foot-candles food prep; 20 foot-candles storage/restroom/handwashing/service; 10 foot-candles dry storage/dining/walk-ins.\n\nLESSON 12 - CLEANING AND SANITIZING\n5 steps: remove food, wash, rinse, sanitize, air dry.\nThree-compartment sink: detergent in first at 110F water, clean hot water second, water+sanitizer third with timer, air dry.\nStationary rack single-temp machines: minimum 165F. High-temp final rinse at least 180F.\nSanitizer parameters:\nChlorine 50-99 ppm, 75-100F, min 7 seconds, best pH 8.0-10.0.\nIodine 12.5-25 ppm, min 68F, min 30 seconds, pH 3.0-5.0.\nQuats: varies.\nClean up vomit/diarrhea immediately and sanitize.\n\nLESSON 13 - PEST CONTROL\nWork with licensed Pest Control Operator (PCO). Exclusion, eliminate food and water, deny shelter. Garbage containers with tight-fitting lids.\n\nLESSON 14 - ACTIVE MANAGERIAL & HACCP\nFDA Public Health Interventions: demonstration of knowledge, employee health controls, controlling hands as vehicle of contamination, time/temperature parameters, consumer advisories.\nHACCP 7 steps: identify hazards; identify Critical Control Points (CCPs); establish critical limits; monitor CCPs; take corrective action; verify; recordkeeping.\n\nACRONYMS: SDS (Safety Data Sheets), OSHA, HACCP, SOP, PCO, NSF, FDA, USDA, CDC.\nWhat makes food unsafe: cross contamination, poor personal hygiene, incorrect cleaning/sanitizing, time and temperature abuse.\n"}, {"name": "Ecolab Food Safety Audit Guidance Key.pdf", "text": "ALBERTSONS COMPANIES - ECOLAB FOOD SAFETY AUDIT GUIDANCE KEY (Updated 11/19/2025)\n\nPURPOSE: Outlines expectations, procedures, responsibilities for Ecolab-conducted Food Safety Audits (FSA) at Albertsons/Safeway locations.\n\nSERVICE SCHEDULE: FSA quarterly (4/year); Ecolab Service Survey (ESS) 8/year; ITSR inventory 8/year. Audits start no earlier than 7am, no later than 4pm. If store is open, it is subject to audit.\n\nDEPARTMENTS AUDITED: Deli, Bakery, Produce, Meat/Seafood, Coffee, Grocery/General, eCommerce, Sushi, Fuel, Central Kitchen.\n\nREPORTS & CORRECTIVE ACTION: Stores receive unscored preliminary report by email. Ecolab QA approves final report within 24-72 hours. Out-of-compliance items load into Corrective Action system. Store management completes corrective action via link in audit notification email.\nESCALATION: If no action entered - 7 Day Notification (to DM, FSM, Store Director/Management), then 14 Day Notification (7 business days later, same recipients).\n\nMARKING: Each question marked IN, OUT, or Unable to Observe.\n\nVIOLATION RISK DEFINITIONS:\nAUTO-FAIL: Immediate serious risk to public health. Only 2 auto-fail questions: (1) No Water in any operating department; (2) Sewage Back-up in any operating department.\nHIGH: Highly likely to cause foodborne illness if not corrected quickly. Examples: improper hot/cold holding of TCS foods, cross-contamination of raw and ready-to-eat, food contact surfaces.\nMEDIUM: Create conditions contributing to food safety risk over time. Examples: handsinks not stocked, improper cooling, improper thawing.\nLOW: Minor violations - general sanitation, operational controls, facilities/structures, equipment design, general maintenance. Examples: facilities in disrepair (floor/wall), non-food contact surfaces soiled, improper storage.\n\n=== SECTION: GOOD HYGIENIC PRACTICES ===\n\nQ100 - Personal Item Storage / Eating, Drinking, Tobacco / Aprons. RISK: LOW. FDA 3-305.11, 2-401.11, 2-304.11.\nIssues: eating/drinking/tobacco/gum in non-designated areas; personal belongings/aprons not stored separately from food; aprons worn to restroom/breakroom/exterior.\nDo NOT deduct: beverage containers in allowed areas below and away from food.\n\nQ101 - Handwashing Procedure. RISK: HIGH. FDA 2-301.12, 2-301.14, 2-301.15.\nIssues: associate did not wash hands when appropriate; did not follow proper procedure; washed hands not at designated handsink.\nDo NOT deduct: not washing after handling money; changing gloves without washing for exact same task; not turning faucet off with paper towel; not washing full 20 seconds.\n\nQ102 - Barehand Contact / Gloves. RISK: HIGH. FDA 3-301.11, 3-304.15, 2-302.11.\nIssues: barehand contact with ready-to-eat foods; gloves not changed when required; gloves reused; gloves not worn over bandages/cuts.\nChange gloves switching raw to RTE, changing tasks, if torn/contaminated. Gloves single-use only.\n\nQ103 - Handwashing Facilities / Sinks Supplied and Accessible. RISK: MEDIUM. FDA 6-301.11, 6-301.12, 5-205.11, 5-202.12.\nIssues: hand sink not supplied with soap; not supplied with paper towels; improperly used (food prep, storage, utensil washing); not accessible/blocked by mobile equipment; water temp <85F; no water available.\nVerify hot water at least 85F within 60 seconds; cold and hot functioning. Restroom handsinks evaluated here.\nDo NOT deduct: paper towels/soap near sink but not in dispenser; usable spray bottles hanging on handsink.\nA leaking hand sink is marked at Q507 for disrepair.\n\n=== SECTION: TIME TEMPERATURE CONTROL FOR SAFETY ===\n\nQ200 - Hot Holding Temperatures (135F). RISK: HIGH. FDA 3-501.16(A)(1), 3-5019.19.\nTCS hot holding must be 135.0F (-2F) or higher at all times. Check 3 items in prep, 3 on sales floor. 1 out of compliance = violation.\nTime as Public Health Control (TPHC): must be marked with discard time, not exceeding 4 hours.\n\nQ201 - Cold Holding Temperatures (41F). RISK: HIGH. FDA 3-501.16(A)(2), 3-5019.19.\nTCS cold holding must be 41.0F (+2F) or below at all times including defrost. Check 3 prep, 3 sales floor. 1 out = violation.\nDo NOT deduct: IR temps not confirmed with probe (except eCommerce); Olive Bar non-TCS items; items in cooling process; raw product.\n\nQ202 - Proper Cooling Methods. RISK: MEDIUM. FDA 3-501.15.\nIssues: food cooling with tight-fitting lid; cooling in deep pan/bowl; cooling at room temperature.\nProper: uncovered/loosely covered, shallow pan, refrigerated unit. Hot items must be removed from bags.\n\nQ203 - Approved Thawing Methods. RISK: MEDIUM. FDA 3-501.13.\nIssues: thawing in standing water; under warm/hot water; at room temperature; vacuum-packaged raw finfish thawing completely sealed.\nProper: in refrigeration; submerged under cool running water; as part of cooking. Vacuum-packaged finfish must be breached before/immediately after thawing.\n\n=== SECTION: EXPIRED FOOD / DATE-MARKING ===\n\nQ300 - Expired RTE/TCS Foods. RISK: HIGH. FDA 3-501.18.\nExpired = expiration date from yesterday or earlier. 1 date out = violation. Must photo the expired product.\nDo NOT deduct: expired infant formula; non-TCS; raw; frozen; donation foods with proper ID.\n\nQ301 - Date-Marking (RTE/TCS held >24 hours). RISK: MEDIUM. FDA 3-501.17.\nStore-prepared/opened RTE TCS foods must be date marked when held more than 24 hours. Date can be open day or expiration day.\n\n=== SECTION: PROTECTION FROM CONTAMINATION / CHEMICALS ===\n\nQ400 - Food Separated and Protected from Contamination. RISK: HIGH. FDA 3-302.11, 3-304.11.\nIssues: cross-contamination of raw and ready-to-eat; improper storage of raw animal foods by cooking temperature; food uncovered with overhead contamination; food in contact with soiled equipment/containers/cardboard/shopping carts.\nStore raw below RTE, separate by dividers/containers.\n\nQ401 - Washing Fruits/Vegetables / ProduceMaxx. RISK: LOW. FDA 3-302.15, 4-302.14, 7-204.12.\nIssues: produce not washed with ProduceMaxx; solution at improper concentration; no test strips.\nSoak applicable produce 3-5 minutes. Concentration 30-60 ppm.\n\nQ402 - Food Contact Surfaces Unclean. RISK: HIGH. FDA 4-601.11(A), 4-602.11(C).\nApplies to: utensil/knife/scoop (2+ to deduct), mixer, food processor/chopper/dicer, cutting board, slicer, grinder, cuber/tenderizer, prep sink, band saw, food container/wares/pan/bowl, ice machine interior, scale pad top, coffee/soda/beverage dispenser.\nFood contact surfaces in use must be washed/rinsed/sanitized at least every 4 hours at room temp (every 10 hours in cold room <=55F).\nOnly deduct for encrusted/excessive build-up, not single specks. Cutting boards verified soiled vs stained with alcohol swab.\nDo NOT deduct: dust on non-food-contact parts; actively being cleaned; bakery loaf pan discoloration; hard water/lime scale build-up. Rust deducts at Q601. Scale (not pad top) at Q505.\n\nQ403 - Improper Cleaning & Sanitizing Procedures. RISK: HIGH. FDA 4-501.110, 4-501.114, 4-501.19.\nIssues: dish machine not reaching 180F final; 3-compartment sink improper sanitizer concentration; spray bottle/bucket improper concentration; improper wash/rinse/sanitize.\nQuat sanitizer 150-400 ppm in use; Kay Liquid Bleach 50-100 ppm. Dish machine final rinse at least 180F (utensil surface above 160F).\n\nQ404 - Toxic Substances Identified, Stored, Used. RISK: MEDIUM. FDA 7-201.11, 7-102.11, 7-202.11.\nIssues: chemicals improperly stored (on/over food/surfaces); improperly labeled (2+ to deduct); improperly used/dispensed (wrong chemical in dispenser).\nStore chemicals away from and below food/contact surfaces. Label all containers with common name.\n\nQ405 - Wiping Cloth Storage. RISK: MEDIUM. FDA 3-304.14, 4-501.11.\nIn-use wiping cloths must be in sanitizer solution (150-400 ppm) when not in use. Used cloths in designated linen storage.\n\n=== SECTION: PHYSICAL FACILITIES / NON-FOOD CONTACT SURFACES / PEST ===\n\nQ500 - Pest Evidence (Rodents, Flies, Cockroaches). RISK: HIGH. FDA 6-501.111(A-C).\nTR must contact Division Food Safety team if observed before leaving. Rodents: droppings, gnaw marks, nests, urine trails. Cockroaches: live/dead, egg casings. Flies: signs in more than one area. Stored product pests: beetles, Indian meal moths.\n\nQ501 - Sewage / Drainage Back-Up. RISK: AUTO FAIL. FDA 5-402.11, 5-403.11.\nStop audit immediately, photo overflow and food prep, call Division Food Safety Leader. Auto-fail if food prep continued or overflow from clean water fixtures causes contamination. Close fresh departments; block off backroom/restroom. Clogged non-overflowing drains deduct at Q503.\n\nQ502 - No Water Available. RISK: AUTO FAIL. FDA 5-103.11, 5-104.12, 5-101.12.\nStop audit immediately, call Division Food Safety Leader. Auto-fail if food prep continued while no water. Close fresh departments.\n\nQ503 - Floors & Drains Soiled / Standing Water. RISK: MEDIUM. FDA 6-501.12, 6-501.2, 5-205.15.\nIssues: floors soiled; drains soiled; standing water. Only deduct for excessive/complete breakdown. Water must be stagnant, pooling, unrelated to cleaning.\nDo NOT deduct: water from active mopping; small condensation without pooling.\n\nQ504 - Refrigerated Full-Service Case w/TCS Foods Soiled. RISK: MEDIUM. FDA 4-601.11(C), 4-602.13, 3-305.11.\nDeli/Meat/Seafood/Bakery full-service cases holding TCS. Check interior surfaces, tracks, fans, drip trays, shelving. Only deduct for encrusted/excessive build-up, not light smears. Sales floor display cases deduct at Q505.\n\nQ505 - Non-Food Contact Surfaces Soiled. RISK: LOW. FDA 4-601.11(C), 4-602.13.\nApplies to: cooking equipment (fryer/oven/turbo chef), proofer, ceiling/wall, sink (not prep), shelving/rack, wrapper, walk-in cooler/freezer (not floor), hot holding case, cold holding case, ambient display case, table, touch points/hand-contact surfaces (door handles, knobs, faucet handles), check stands, grocery aisles (chip/bread/pet only). Restroom cleanliness evaluated here.\nOnly deduct for encrusted/excessive build-up. Do NOT deduct: light dust; rarely-accessed minimal accumulation; actively being cleaned.\n\nQ506 - Exterior and Refuse / Garbage Areas / Open Doors. RISK: LOW. FDA 5-501.113, 6-202.15, 5-501.115.\nIssues: door/loading dock open and not in use; garbage/refuse area disrepair/standing water; exterior clutter/harborage.\n\nQ507 - Physical Facilities in Good Repair. RISK: LOW. FDA 6-501.11.\nIssues: floor in disrepair; baseboard/coving disrepair; wall/ceiling disrepair; door/door sweep gap present; faucet/plumbing leak in disrepair.\nSurface out of compliance if damaged and no longer cleanable. Gap if light visible under/around door.\nDo NOT deduct: items with work orders submitted within last 30 days (proper documentation). Work orders older than 30 days unresolved will deduct. Work orders cannot be submitted during the audit. Open doors deduct at Q506.\n\n=== SECTION: UTENSILS, EQUIPMENT, SUPPLY STORAGE AND USE ===\n\nQ600 - Food/Supplies/Packaging Not Properly Stored. RISK: LOW. FDA 3-305.11, 4-903.11, 3-306.11, 3-306.13.\nIssues: food not elevated 6 inches; packaging/supplies/equipment not elevated 6 inches; food packaging not protected from overhead contamination; open food not protected from consumer (sneeze guard).\nDo NOT deduct: milk in crates, pressurized beverages, bread on trays; sales floor shelving/displays.\n\nQ601 - Food Contact Surfaces/Utensils in Good Repair / Approved / Rust / Cleanable. RISK: LOW. FDA 4-202.11, 4-101.11, 4-603.11.\nIssues: food contact surface in disrepair/damaged; cutting board deep grooves; knives/utensils damaged or rusted; unapproved materials; utensils improperly stored in use; wet nesting.\nDo NOT deduct: wood donut tools/rolling pins, large bakery wood table, wood handles, glass ingredient containers.\n\nQ602 - Non-Food Contact Surfaces in Good Repair / Ice Build-Up. RISK: LOW. FDA 4-501.11, 4-202.16, 4-101.19.\nIssues: non-food contact equipment disrepair/damaged; excessive ice build-up; cardboard re-used or lining shelf.\nDo NOT deduct: minor ice build-up; banana boxes for donations. Work order rules same as Q507.\n\n=== SECTION: PROPER TOOLS AND SUPPLIES ===\n\nQ700 - Test Strips / Thermometers. RISK: LOW. FDA 4-203.11, 4-204.112, 4-302.14.\nIssues: no probe thermometer; no/expired quat test strips; no/expired chlorine test strips; no dish machine temperature measuring device/label.\nDo NOT deduct: test strips without expiration date.\n\n=== SECTION: RECORDS AND SIGNAGE ===\n\nQ800 - Molluscan Shellstock Identification. RISK: MEDIUM. FDA 3-201.14, 3-202.18, 3-203.12.\nTags retained 90 days chronological after last shellstock sold; marked with last sold/discarded date; current product has tag present.\n\nQ801 - Consumer Advisory Signage. RISK: LOW. FDA 3-603.11.\nConsumer advisory posted and visible where raw/undercooked animal foods offered (sushi, seafood).\n\n=== NON-SCORED ADDENDUM (by division) ===\nCFPM: PIC must have valid current Certified Food Protection Manager certificate. FDA 2-102.11(C).\nNorCal/SoCal Water Temp: hand sinks 100F within 60 sec; department 3-comp sink 120F within 60 sec.\nPortland/United cold holding: check 5 additional RTE TCS items in Deli (and Produce for Portland).\nWashington State Food Handler Cards: valid cards within 14 days of hire, WAC 246-217.\nSouthern Division cold case thermometers: working thermometer in warmest part of unit, <=41F.\n\nDEFINITIONS: TR = Territory Representative/Auditor (Ecolab). PIC = Person in Charge (store employee). FSA = quarterly Food Safety Audit. Hand Sink = fixture for handwashing only. Food Contact Surface = direct food contact. TCS = Time/Temperature Control for Safety. RTE = Ready-to-Eat.\n"}]</script>
  <script type="text/babel">
    const { useState, useEffect, useRef } = React;

    /* ============================================================
       >>>>>>>>>> PASTE YOUR API KEY HERE <<<<<<<<<<
       Replace the empty quotes below with your key (starts with sk-ant-api03-)
       Example:  const HARDCODED_API_KEY = "sk-ant-api03-abc123...";
       Leave it as ""  if you'd rather type the key in the app instead.
       ============================================================ */
    const HARDCODED_API_KEY = "sk-ant-api03-b-2gaZ88hsmzYS6tHeoXDCGuHJ9XQbt0c14rY3Nn
OtamxfKXhzkJDV84G9t5ypwCiKIpU2GAKAgNIM162rawAQ-MgksCA
AA";
    /* ==================== END API KEY ==================== */


    // Built-in documents baked into the app. No upload, parsing, or storage needed.
    const BUILTIN_DOCS = JSON.parse(document.getElementById("builtin-docs").textContent);

    // IndexedDB just for the API key (small).
    const DB_NAME = "safety-assistant-db", STORE = "kv";
    function openDB(){return new Promise((res,rej)=>{const r=indexedDB.open(DB_NAME,1);r.onupgradeneeded=()=>r.result.createObjectStore(STORE);r.onsuccess=()=>res(r.result);r.onerror=()=>rej(r.error);});}
    async function idbGet(k){try{const db=await openDB();return await new Promise((res,rej)=>{const t=db.transaction(STORE,"readonly").objectStore(STORE).get(k);t.onsuccess=()=>res(t.result??null);t.onerror=()=>rej(t.error);});}catch(e){return null;}}
    async function idbSet(k,v){try{const db=await openDB();return await new Promise((res,rej)=>{const t=db.transaction(STORE,"readwrite").objectStore(STORE).put(v,k);t.onsuccess=()=>res(true);t.onerror=()=>rej(t.error);});}catch(e){return false;}}

    const compressImageToJpeg = (file) => new Promise((resolve,reject)=>{
      const url=URL.createObjectURL(file);const img=new Image();
      img.onload=()=>{const MAX=1024;let w=img.width,h=img.height;if(w>MAX||h>MAX){if(w>h){h=Math.round(h*MAX/w);w=MAX;}else{w=Math.round(w*MAX/h);h=MAX;}}const c=document.createElement("canvas");c.width=w;c.height=h;c.getContext("2d").drawImage(img,0,0,w,h);const b64=c.toDataURL("image/jpeg",0.75).split(",")[1];URL.revokeObjectURL(url);resolve(b64);};
      img.onerror=()=>{URL.revokeObjectURL(url);reject(new Error("Could not load image."));};img.src=url;
    });

    function App(){
      const [apiKey,setApiKey]=useState("");
      const [showKeyInput,setShowKeyInput]=useState(false);
      const [question,setQuestion]=useState("");
      const [photo,setPhoto]=useState(null);
      const [photoName,setPhotoName]=useState("");
      const [answer,setAnswer]=useState(null);
      const [isListening,setIsListening]=useState(false);
      const [isLoading,setIsLoading]=useState(false);
      const [isSpeaking,setIsSpeaking]=useState(false);
      const [status,setStatus]=useState("");
      const [sessionLog,setSessionLog]=useState([]);
      const [view,setView]=useState("ask");
      const [summaryText,setSummaryText]=useState("");
      const [summaryLoading,setSummaryLoading]=useState(false);
      const [loaded,setLoaded]=useState(false);
      const recognitionRef=useRef(null);
      const libraryInputRef=useRef(null);
      const cameraInputRef=useRef(null);

      useEffect(()=>{(async()=>{
        if(HARDCODED_API_KEY && HARDCODED_API_KEY.trim()){
          setApiKey(HARDCODED_API_KEY.trim());
          setShowKeyInput(false);
        } else {
          const key=await idbGet("safety-api-key");
          if(key)setApiKey(key); else setShowKeyInput(true);
        }
        setLoaded(true);
      })();},[]);

      const saveApiKey=async()=>{if(!apiKey.trim())return;await idbSet("safety-api-key",apiKey.trim());setShowKeyInput(false);};

      const handlePhoto=async(e)=>{
        const file=e.target.files[0]; if(!file)return;
        setStatus("Processing photo...");
        try{const b64=await compressImageToJpeg(file);setPhoto(b64);setPhotoName(file.name||"photo.jpg");setStatus("");}
        catch(err){setStatus("Photo error: "+err.message);}
        e.target.value="";
      };
      const clearPhoto=()=>{setPhoto(null);setPhotoName("");};

      const startListening=()=>{
        const SR=window.SpeechRecognition||window.webkitSpeechRecognition;
        if(!SR){alert("Speech not supported. Please type.");return;}
        const r=new SR();r.lang="en-US";r.continuous=false;r.interimResults=false;
        r.onresult=(e)=>{setQuestion(e.results[0][0].transcript);setIsListening(false);};
        r.onerror=()=>setIsListening(false);r.onend=()=>setIsListening(false);
        recognitionRef.current=r;r.start();setIsListening(true);
      };
      const stopListening=()=>{recognitionRef.current&&recognitionRef.current.stop();setIsListening(false);};

      const callClaude=async(content,maxTokens)=>{
        const res=await fetch("https://api.anthropic.com/v1/messages",{
          method:"POST",
          headers:{"Content-Type":"application/json","x-api-key":apiKey,"anthropic-version":"2023-06-01","anthropic-dangerous-direct-browser-access":"true"},
          body:JSON.stringify({model:"claude-sonnet-4-6",max_tokens:maxTokens||1500,messages:[{role:"user",content}]})
        });
        if(!res.ok){let m="HTTP "+res.status;try{const e=await res.json();if(e.error&&e.error.message)m=e.error.message;}catch(x){}throw new Error(m);}
        const data=await res.json();
        if(data.error)throw new Error(data.error.message);
        return data.content[0].text;
      };

      const parseAnswer=(text)=>{
        const f={};const keys=["SEVERITY","VIOLATION","WHY THIS IS A VIOLATION","FINDING","DETAIL","CORRECTIVE ACTION","REFERENCE"];
        let ck=null,cv=[];
        text.split("\n").forEach(function(line){
          const mk=keys.find(k=>line.toUpperCase().startsWith(k+":"));
          if(mk){if(ck)f[ck]=cv.join(" ").trim();ck=mk;cv=[line.slice(mk.length+1).trim()];}
          else if(ck&&line.trim())cv.push(line.trim());
        });
        if(ck)f[ck]=cv.join(" ").trim();
        f._raw=text;return f;
      };

      const buildDocContext=()=>BUILTIN_DOCS.map(d=>"===== "+d.name+" =====\n"+d.text).join("\n\n");

      const askQuestion=async()=>{
        if(!question.trim()&&!photo){alert("Speak a question or upload a photo.");return;}
        if(!apiKey){alert("Enter your API key.");setShowKeyInput(true);return;}
        setIsLoading(true);setAnswer(null);window.speechSynthesis.cancel();
        try{
          const content=[];
          if(photo)content.push({type:"image",source:{type:"base64",media_type:"image/jpeg",data:photo}});
          const prompt="You are a food safety and workplace safety compliance expert with deep knowledge of the FDA Food Code, OSHA regulations, and retail grocery standards. Use the reference documents below to answer.\n\n"
            +(photo?"Analyze the uploaded photo for any food safety or workplace safety violations.\n":"")
            +(question.trim()?("User question: "+question+"\n"):"")
            +"\nRespond in exactly this format:\n\n"
            +"SEVERITY: [Auto-Fail / High / Medium / Low / Not a Violation]\n"
            +(photo?"VIOLATION: [Name or type of violation]\nWHY THIS IS A VIOLATION: [Specific health risk or regulatory basis]\n":"")
            +"FINDING: [One clear sentence summary]\n"
            +"DETAIL: [Full explanation referencing the documents]\n"
            +"CORRECTIVE ACTION: [Step-by-step corrective actions]\n"
            +"REFERENCE: [Ecolab question number and/or FDA Food Code section]\n\n"
            +"=== REFERENCE DOCUMENTS ===\n"+buildDocContext();
          content.push({type:"text",text:prompt});
          const text=await callClaude(content);
          const parsed=parseAnswer(text);setAnswer(parsed);
          setSessionLog(prev=>prev.concat([{question:question||"Photo analysis",severity:parsed["SEVERITY"]||"",violation:parsed["VIOLATION"]||"",finding:parsed["FINDING"]||"",why:parsed["WHY THIS IS A VIOLATION"]||"",corrective:parsed["CORRECTIVE ACTION"]||"",reference:parsed["REFERENCE"]||"",time:new Date().toLocaleTimeString()}]));
          const speak=[parsed["SEVERITY"]?("Severity: "+parsed["SEVERITY"]+"."):"",parsed["VIOLATION"]||"",parsed["FINDING"]||"",parsed["WHY THIS IS A VIOLATION"]?("Why: "+parsed["WHY THIS IS A VIOLATION"]):"",parsed["CORRECTIVE ACTION"]?("Corrective action: "+parsed["CORRECTIVE ACTION"]):""].filter(Boolean).join(" ");
          const utt=new SpeechSynthesisUtterance(speak);utt.rate=0.9;utt.onend=()=>setIsSpeaking(false);setIsSpeaking(true);window.speechSynthesis.speak(utt);
        }catch(e){setAnswer({_raw:"Error: "+e.message});}
        setIsLoading(false);
      };

      const generateSummary=async()=>{
        if(sessionLog.length===0){alert("No findings yet.");return;}
        setSummaryLoading(true);setSummaryText("");
        try{
          const logText=sessionLog.map((it,i)=>"Finding "+(i+1)+" ["+it.time+"]:\nQ: "+it.question+"\nSeverity: "+it.severity+"\nViolation: "+(it.violation||"N/A")+"\nFinding: "+it.finding+"\nWhy: "+(it.why||"N/A")+"\nCorrective: "+it.corrective+"\nRef: "+it.reference).join("\n\n---\n\n");
          const text=await callClaude([{type:"text",text:"Generate a professional Store Walk Compliance Report for "+new Date().toLocaleDateString()+". Include: executive summary, total findings by severity, each finding with violation/why/corrective action, immediate action items, overall assessment.\n\nFindings:\n"+logText}],2048);
          setSummaryText(text);
        }catch(e){setSummaryText("Error: "+e.message);}
        setSummaryLoading(false);
      };

      const saveAsPDF=()=>{
        const date=new Date().toLocaleDateString();
        const body=summaryText.split("\n").map(l=>l.trim()?("<p>"+l+"</p>"):"<hr>").join("");
        const html="<!DOCTYPE html><html><head><meta charset='utf-8'><title>Store Walk Report - "+date+"</title><style>body{font-family:Arial,sans-serif;padding:40px;max-width:720px;margin:0 auto;color:#111;line-height:1.7}p{margin:5px 0;font-size:15px}hr{border:none;border-top:1px solid #e5e7eb;margin:12px 0}@media print{body{padding:20px}}</style></head><body>"+body+"</body></html>";
        const win=window.open("","_blank");win.document.write(html);win.document.close();setTimeout(()=>{win.focus();win.print();},400);
      };

      const stopSpeaking=()=>{window.speechSynthesis.cancel();setIsSpeaking(false);};
      const clearAll=()=>{setQuestion("");setAnswer(null);clearPhoto();stopSpeaking();};

      const sevColor=(s)=>{s=s||"";const sl=s.toLowerCase();return sl.indexOf("auto")>-1?"#6d28d9":sl.indexOf("high")>-1?"#b91c1c":sl.indexOf("medium")>-1?"#b45309":sl.indexOf("low")>-1?"#1d4ed8":"#166534";};
      const sevBg=(s)=>{s=s||"";const sl=s.toLowerCase();return sl.indexOf("auto")>-1?"#f5f3ff":sl.indexOf("high")>-1?"#fef2f2":sl.indexOf("medium")>-1?"#fffbeb":sl.indexOf("low")>-1?"#eff6ff":"#f0fdf4";};

      const Field=(p)=>p.value?React.createElement("div",{style:{marginBottom:"14px"}},
        React.createElement("div",{style:{fontSize:"11px",fontWeight:"700",color:"#9ca3af",textTransform:"uppercase",letterSpacing:"0.06em",marginBottom:"3px"}},p.label),
        React.createElement("div",{style:{fontSize:"15px",color:"#111",lineHeight:"1.65"}},p.value)):null;

      const card={padding:"16px",border:"1px solid #e5e7eb",borderRadius:"10px",marginBottom:"16px"};
      const NavBtn=(p)=>React.createElement("button",{onClick:()=>{setView(p.target);if(p.target==="summary"&&!summaryText&&sessionLog.length>0)generateSummary();},style:{padding:"10px 16px",borderRadius:"8px",border:view===p.target?"2px solid #111":"1px solid #d1d5db",background:view===p.target?"#111":"#fff",color:view===p.target?"#fff":"#374151",fontSize:"14px",fontWeight:view===p.target?"700":"400",cursor:"pointer"}},p.label);

      if(!loaded)return React.createElement("div",{style:{padding:"40px",textAlign:"center",color:"#9ca3af",fontSize:"14px"}},"Loading...");

      return React.createElement("div",{style:{minHeight:"100vh",background:"#fff",padding:"24px 16px",maxWidth:"580px",margin:"0 auto"}},
        React.createElement("h1",{style:{fontSize:"20px",fontWeight:"700",marginBottom:"2px"}},"Safety Document Assistant"),
        React.createElement("p",{style:{fontSize:"13px",color:"#6b7280",marginBottom:"20px"}},"Store walk compliance tool - documents built in"),
        React.createElement("div",{style:{display:"flex",gap:"8px",marginBottom:"24px"}},
          React.createElement(NavBtn,{label:"Ask / Analyze",target:"ask"}),
          React.createElement(NavBtn,{label:"Summary"+(sessionLog.length>0?(" ("+sessionLog.length+")"):""),target:"summary"})
        ),

        showKeyInput?React.createElement("div",{style:card},
          React.createElement("div",{style:{fontSize:"13px",fontWeight:"600",marginBottom:"4px"}},"Anthropic API Key"),
          React.createElement("div",{style:{fontSize:"12px",color:"#9ca3af",marginBottom:"10px"}},"Enter once - saved to this device permanently."),
          React.createElement("input",{type:"password",value:apiKey,onChange:e=>setApiKey(e.target.value),placeholder:"sk-ant-...",style:{width:"100%",padding:"10px 12px",borderRadius:"8px",border:"1px solid #d1d5db",fontSize:"14px",marginBottom:"10px"}}),
          React.createElement("button",{onClick:saveApiKey,style:{width:"100%",padding:"12px",borderRadius:"8px",border:"none",background:"#111",color:"#fff",fontSize:"15px",fontWeight:"600",cursor:"pointer"}},"Save Key")
        ):React.createElement("div",{style:Object.assign({},card,{display:"flex",justifyContent:"space-between",alignItems:"center"})},
          React.createElement("span",{style:{fontSize:"13px"}},"API key saved"),
          React.createElement("button",{onClick:()=>setShowKeyInput(true),style:{background:"none",border:"none",color:"#6b7280",fontSize:"12px",cursor:"pointer",textDecoration:"underline"}},"Change")
        ),

        React.createElement("div",{style:card},
          React.createElement("div",{style:{fontSize:"13px",fontWeight:"600",marginBottom:"8px"}},"Reference Documents (built in)"),
          BUILTIN_DOCS.map((d,i)=>React.createElement("div",{key:i,style:{fontSize:"13px",color:"#374151",padding:"4px 0"}},"\u2713 "+d.name))
        ),

        view==="ask"?React.createElement(React.Fragment,null,
          React.createElement("div",{style:card},
            React.createElement("div",{style:{fontSize:"13px",fontWeight:"600",marginBottom:"10px"}},"Question"),
            React.createElement("button",{onClick:isListening?stopListening:startListening,style:{width:"100%",padding:"14px",borderRadius:"8px",border:"1px solid #d1d5db",background:isListening?"#fef2f2":"#f9fafb",color:isListening?"#b91c1c":"#374151",fontSize:"15px",cursor:"pointer",marginBottom:"10px",fontWeight:"600"}},isListening?"Listening - tap to stop":"Tap to speak"),
            React.createElement("textarea",{value:question,onChange:e=>setQuestion(e.target.value),placeholder:"Or type your question here...",style:{width:"100%",padding:"10px 12px",borderRadius:"8px",border:"1px solid #d1d5db",fontSize:"14px",minHeight:"80px",resize:"vertical"}})
          ),
          React.createElement("div",{style:card},
            React.createElement("div",{style:{fontSize:"13px",fontWeight:"600",marginBottom:"4px"}},"Photo of Violation (optional)"),
            React.createElement("div",{style:{fontSize:"12px",color:"#9ca3af",marginBottom:"10px"}},"Claude identifies the violation, explains why it fails code, and gives corrective steps."),
            photo?React.createElement("div",null,
              React.createElement("img",{src:"data:image/jpeg;base64,"+photo,alt:"Violation",style:{width:"100%",maxHeight:"220px",objectFit:"cover",borderRadius:"8px",marginBottom:"8px"}}),
              React.createElement("div",{style:{display:"flex",justifyContent:"space-between",alignItems:"center"}},
                React.createElement("span",{style:{fontSize:"12px",color:"#374151"}},photoName),
                React.createElement("button",{onClick:clearPhoto,style:{background:"none",border:"none",color:"#9ca3af",fontSize:"12px",cursor:"pointer"}},"Remove")
              )
            ):React.createElement("div",{style:{display:"flex",gap:"8px"}},
              React.createElement("button",{onClick:()=>libraryInputRef.current&&libraryInputRef.current.click(),style:{flex:1,padding:"14px",borderRadius:"8px",border:"1px solid #d1d5db",background:"#f9fafb",color:"#374151",fontSize:"14px",fontWeight:"600",cursor:"pointer"}},"Choose from Library"),
              React.createElement("button",{onClick:()=>cameraInputRef.current&&cameraInputRef.current.click(),style:{flex:1,padding:"14px",borderRadius:"8px",border:"1px solid #d1d5db",background:"#f9fafb",color:"#374151",fontSize:"14px",fontWeight:"600",cursor:"pointer"}},"Take Photo")
            ),
            React.createElement("input",{ref:libraryInputRef,type:"file",accept:"image/*",onChange:handlePhoto,style:{display:"none"}}),
            React.createElement("input",{ref:cameraInputRef,type:"file",accept:"image/*",capture:"environment",onChange:handlePhoto,style:{display:"none"}})
          ),
          status?React.createElement("div",{style:{fontSize:"12px",color:"#6b7280",marginBottom:"12px"}},status):null,
          React.createElement("button",{onClick:askQuestion,disabled:isLoading||(!question.trim()&&!photo),style:{width:"100%",padding:"16px",borderRadius:"10px",border:"none",background:isLoading||(!question.trim()&&!photo)?"#e5e7eb":"#111",color:isLoading||(!question.trim()&&!photo)?"#9ca3af":"#fff",fontSize:"16px",fontWeight:"700",cursor:isLoading||(!question.trim()&&!photo)?"not-allowed":"pointer",marginBottom:"16px"}},isLoading?"Analyzing...":"Get Answer"),
          answer?React.createElement("div",{style:card},
            answer["SEVERITY"]?React.createElement("div",{style:{display:"inline-block",padding:"4px 12px",borderRadius:"20px",background:sevBg(answer["SEVERITY"]),border:"1px solid "+sevColor(answer["SEVERITY"]),marginBottom:"16px"}},
              React.createElement("span",{style:{fontSize:"12px",fontWeight:"700",color:sevColor(answer["SEVERITY"]),textTransform:"uppercase",letterSpacing:"0.05em"}},answer["SEVERITY"])):null,
            React.createElement(Field,{label:"Violation",value:answer["VIOLATION"]}),
            React.createElement(Field,{label:"Why This Is a Violation",value:answer["WHY THIS IS A VIOLATION"]}),
            React.createElement(Field,{label:"Finding",value:answer["FINDING"]}),
            React.createElement(Field,{label:"Detail",value:answer["DETAIL"]}),
            React.createElement(Field,{label:"Corrective Action",value:answer["CORRECTIVE ACTION"]}),
            React.createElement(Field,{label:"Reference",value:answer["REFERENCE"]}),
            !answer["SEVERITY"]?React.createElement("div",{style:{fontSize:"15px",lineHeight:"1.65",color:"#111"}},answer["_raw"]):null,
            React.createElement("div",{style:{display:"flex",gap:"8px",marginTop:"12px"}},
              isSpeaking?React.createElement("button",{onClick:stopSpeaking,style:{padding:"8px 14px",borderRadius:"6px",border:"1px solid #d1d5db",fontSize:"13px",cursor:"pointer"}},"Stop speaking"):null,
              React.createElement("button",{onClick:clearAll,style:{padding:"8px 14px",borderRadius:"6px",border:"1px solid #d1d5db",fontSize:"13px",cursor:"pointer"}},"Clear")
            )
          ):null,
          sessionLog.length>0?React.createElement("div",{style:{fontSize:"12px",color:"#9ca3af",textAlign:"center"}},sessionLog.length+" finding"+(sessionLog.length>1?"s":"")+" logged this session"):null
        ):null,

        view==="summary"?React.createElement(React.Fragment,null,
          sessionLog.length===0?React.createElement("div",{style:Object.assign({},card,{textAlign:"center"})},
            React.createElement("div",{style:{fontSize:"15px",color:"#6b7280"}},"No findings yet. Ask questions or analyze photos during your store walk.")
          ):React.createElement(React.Fragment,null,
            React.createElement("div",{style:{display:"flex",gap:"8px",marginBottom:"16px"}},
              React.createElement("button",{onClick:generateSummary,disabled:summaryLoading,style:{flex:1,padding:"12px",borderRadius:"8px",border:"1px solid #d1d5db",background:"#f9fafb",fontSize:"14px",fontWeight:"600",cursor:summaryLoading?"not-allowed":"pointer"}},summaryLoading?"Generating...":(summaryText?"Regenerate":"Generate Summary")),
              React.createElement("button",{onClick:saveAsPDF,disabled:!summaryText,style:{flex:1,padding:"12px",borderRadius:"8px",border:"none",background:!summaryText?"#e5e7eb":"#111",color:!summaryText?"#9ca3af":"#fff",fontSize:"14px",fontWeight:"600",cursor:!summaryText?"not-allowed":"pointer"}},"Save as PDF")
            ),
            summaryText?React.createElement("div",{style:card},summaryText.split("\n").map((line,i)=>line.trim()?React.createElement("div",{key:i,style:{fontSize:"14px",lineHeight:"1.7",color:"#111",marginBottom:"4px"}},line):React.createElement("div",{key:i,style:{height:"10px"}}))):null,
            React.createElement("div",{style:{fontSize:"13px",fontWeight:"600",color:"#374151",marginBottom:"10px"}},"All findings this session"),
            sessionLog.map((item,i)=>React.createElement("div",{key:i,style:Object.assign({},card,{marginBottom:"8px"})},
              React.createElement("div",{style:{display:"flex",justifyContent:"space-between",marginBottom:"6px"}},
                React.createElement("span",{style:{fontSize:"12px",fontWeight:"700",color:sevColor(item.severity),textTransform:"uppercase"}},item.severity||"-"),
                React.createElement("span",{style:{fontSize:"11px",color:"#9ca3af"}},item.time)
              ),
              item.violation?React.createElement("div",{style:{fontSize:"13px",fontWeight:"600",color:"#111",marginBottom:"2px"}},item.violation):null,
              React.createElement("div",{style:{fontSize:"13px",color:"#6b7280"}},item.question),
              item.finding?React.createElement("div",{style:{fontSize:"13px",color:"#374151",marginTop:"4px"}},item.finding):null
            ))
          )
        ):null,

        React.createElement("div",{style:{fontSize:"11px",color:"#e5e7eb",textAlign:"center",marginTop:"24px",paddingBottom:"24px"}},"Documents built in - API key saved to this device")
      );
    }
    ReactDOM.createRoot(document.getElementById("root")).render(React.createElement(App));
  </script>
</body>
